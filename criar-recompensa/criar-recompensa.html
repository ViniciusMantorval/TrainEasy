<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastrar Recompensa</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="criar-recompensa.css">
</head>
<body>
  <div class="container">
    <h1>🎁 Cadastrar Nova Recompensa</h1>
    <form id="form-recompensa">
      <label for="nome">Nome da Recompensa:</label>
      <input type="text" id="nome" required>

      <label for="descricao">Descrição:</label>
      <textarea id="descricao" required></textarea>

      <label for="pontos">Preço em Pontos:</label>
      <input type="number" id="pontos" min="1" required>

      <label for="quantidade">Quantidade da Recompensa</label>
      <input type="number" id="quantidade" min="1" required>

      <button type="submit">Cadastrar</button>
    </form>
    <p id="mensagem"></p>
  </div>
  <script src="criar-recompensa.js"></script>
</body>
</html>
